<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>EVO Swap — Field Tech Walkthrough · Summit Broadband</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0b2545; --cyan:#00bbbb; --teal:#18b6c9; --good:#1a7f37; --good-bg:#e7f6ec; --bad:#b42318; --bad-bg:#fde9e7; }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  [hidden]{display:none!important}
  body{font-family:Manrope,system-ui,Arial,sans-serif;color:#fff;
    background:radial-gradient(120% 120% at 50% 0%, #16386b 0%, var(--navy) 55%, #081a33 100%);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:10px;flex:none}
  .bar .logo{background:#fff;border-radius:11px;padding:6px 11px;display:flex;align-items:center}
  .bar .logo img{height:26px;width:auto;display:block}
  .bar .count{font-weight:800;font-size:13px;color:#bcd3ee;letter-spacing:.04em}
  .bar .x{appearance:none;border:0;background:rgba(255,255,255,.12);color:#fff;width:38px;height:38px;border-radius:10px;font-size:17px;cursor:pointer;flex:none}
  .tlang{appearance:none;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.08);color:#dce6f2;font:inherit;font-weight:800;font-size:12px;padding:8px 11px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .tlang-opt{opacity:.5}.tlang-opt.on{opacity:1;color:#fff}.tlang-sep{opacity:.4}
  .tlang:hover{border-color:rgba(255,255,255,.5)}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;min-height:0;padding:4px 14px 0}
  .explain{width:100%;max-width:460px;flex:none;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);
    border-radius:16px;padding:13px 16px;margin-bottom:10px;animation:in .25s ease}
  .explain .kick{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);font-weight:800;margin-bottom:4px}
  .explain h2{margin:0 0 5px;font-size:18px;line-height:1.2;font-weight:800}
  .explain p{margin:0;font-size:13.5px;line-height:1.5;color:#dce6f2}
  .hl{color:#ffd66b;font-weight:800}.ok-t{color:#7ee2a8;font-weight:800}.no-t{color:#ff9c8f;font-weight:800}
  @keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .device{position:relative;width:100%;max-width:430px;flex:1;min-height:0;margin-bottom:10px;border-radius:20px;
    overflow:hidden;background:#eef2f7;box-shadow:0 18px 50px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15)}
  .device iframe{position:absolute;inset:0;width:100%;height:100%;border:0;pointer-events:none;background:#eef2f7}
  .device .tag{position:absolute;left:0;right:0;bottom:0;text-align:center;font-size:11px;font-weight:700;color:#fff;
    background:linear-gradient(0deg, rgba(11,37,69,.92), rgba(11,37,69,0));padding:18px 8px 7px;letter-spacing:.04em}
  .panel{width:100%;max-width:460px;flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:26px 22px;margin-bottom:10px;overflow:auto;animation:in .25s ease}
  .panel .ic{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;font-size:25px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--teal));color:#06303a;margin-bottom:13px}
  .panel h2{margin:0 0 9px;font-size:23px;font-weight:800;line-height:1.15}
  .panel p{margin:0 0 9px;font-size:15px;line-height:1.55;color:#dce6f2}
  .panel .logo-lg{background:#fff;border-radius:14px;padding:10px 16px;display:inline-flex;align-self:flex-start;margin-bottom:16px}
  .panel .logo-lg img{height:34px}
  .foot{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
  .nav{appearance:none;border:0;font:inherit;font-weight:800;font-size:15px;padding:13px 20px;border-radius:13px;cursor:pointer}
  .back{background:rgba(255,255,255,.12);color:#fff}.back:disabled{opacity:.35;cursor:default}
  .next{background:linear-gradient(135deg,var(--cyan),var(--teal));color:#06303a}
  .dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25)}.dot.on{background:var(--cyan);transform:scale(1.35)}
  @media(max-width:480px){ .explain h2{font-size:16.5px} .panel h2{font-size:21px} }
  /* desktop: widen the embed so it shows the real two-pane layout */
  body.dev-desktop .device,body.dev-desktop .explain,body.dev-desktop .panel{max-width:1080px}
  body.dev-desktop .stage{padding-left:24px;padding-right:24px}
  body.dev-desktop .explain h2{font-size:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <div class="logo"><img src="https://images.weserv.nl/?url=https%3A%2F%2Fwww.dropbox.com%2Fscl%2Ffi%2Fx4s94tmq5dsayd04yrkt9%2F30yrs-footer.png%3Frlkey%3D53ncalcl2fo0wcpkldm5gii42%26raw%3D1&amp;output=png" alt="Summit Broadband"></div>
    <div class="count" id="count">1 / 9</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="tlang" aria-label="Language">
        <span class="tlang-opt" data-lang="en">EN</span><span class="tlang-sep">·</span><span class="tlang-opt" data-lang="es">ES</span>
      </button>
      <button class="x" id="close" type="button" aria-label="Close tutorial">✕</button>
    </div>
  </div>
  <div class="stage">
    <div class="explain" id="explain" hidden></div>
    <div class="device" id="device" hidden>
      <iframe id="siteFrame" src="index.html?embed=1" title="EVO Swap dashboard preview" scrolling="no"></iframe>
      <div class="tag" id="deviceTag"></div>
    </div>
    <div class="panel" id="panel" hidden></div>
  </div>
  <div class="foot">
    <button class="nav back" id="back" type="button">‹ Back</button>
    <div class="dots" id="dots"></div>
    <button class="nav next" id="next" type="button">Next ›</button>
  </div>
</div>
<script>
const LOGO="https://images.weserv.nl/?url="+encodeURIComponent("https://www.dropbox.com/scl/fi/x4s94tmq5dsayd04yrkt9/30yrs-footer.png?rlkey=53ncalcl2fo0wcpkldm5gii42&raw=1")+"&output=png";
const SLIDES=[
  { type:"panel",
    html:{en:`
      <div class="logo-lg"><img src="${LOGO}" alt="Summit Broadband"></div>
      <div style="color:var(--cyan);font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:11px;margin-bottom:6px">Summit Broadband · Field</div>
      <h2>EVO Swap Request — Walkthrough</h2>
      <p>A tour of the <b>actual screen</b> you'll use, section by section, with a filled-in example.</p>
      <p style="color:#9fb3cc">Tap <b>Next ›</b>, swipe, or use arrow keys.</p>`,
    es:`
      <div class="logo-lg"><img src="${LOGO}" alt="Summit Broadband"></div>
      <div style="color:var(--cyan);font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:11px;margin-bottom:6px">Summit Broadband · Campo</div>
      <h2>Solicitud de Cambio EVO — Recorrido</h2>
      <p>Un recorrido por la <b>pantalla real</b> que usarás, sección por sección, con un ejemplo lleno.</p>
      <p style="color:#9fb3cc">Toca <b>Siguiente ›</b>, desliza o usa las flechas.</p>`} },
  { type:"live", step:0, sel:null,
    tag:{en:"Home screen",es:"Pantalla de inicio"}, kick:{en:"The screen",es:"La pantalla"}, title:{en:"This is your EVO Swap screen",es:"Esta es tu pantalla de Cambio EVO"},
    text:{en:`Every swap needs approval from <b>Anthony or Peterson</b> — <span class="hl">no exceptions</span>. The screen keeps the job locked until a manager decides.`,
          es:`Todo cambio necesita aprobación de <b>Anthony o Peterson</b> — <span class="hl">sin excepciones</span>. La pantalla mantiene el trabajo bloqueado hasta que un gerente decida.`},
    dtext:{en:`Every swap needs approval from <b>Anthony or Peterson</b> — <span class="hl">no exceptions</span>. Your progress and guides stay pinned on the <b>left</b>; the active step shows on the right.`,
           es:`Todo cambio necesita aprobación de <b>Anthony o Peterson</b> — <span class="hl">sin excepciones</span>. Tu progreso y las guías quedan fijos a la <b>izquierda</b>; el paso activo se muestra a la derecha.`} },
  { type:"live", step:0, sel:".resources",
    tag:{en:"Step 1 · Basics & Guides",es:"Paso 1 · Fundamentos y Guías"}, kick:{en:"Step 1",es:"Paso 1"}, title:{en:"Run the basics first",es:"Revisa los fundamentos primero"},
    text:{en:`Tap any <b>Guide</b> to open the SOP at the right page. When you've done the basics, tap <b>“I've reviewed the basics.”</b>`,
          es:`Toca cualquier <b>Guía</b> para abrir el SOP en la página correcta. Cuando hayas hecho los fundamentos, toca <b>“He revisado los fundamentos.”</b>`},
    dtext:{en:`Open any <b>Guide</b> from the left sidebar to read the SOP. When the basics are done, click <b>“I've reviewed the basics.”</b>`,
           es:`Abre cualquier <b>Guía</b> desde la barra izquierda para leer el SOP. Cuando los fundamentos estén listos, haz clic en <b>“He revisado los fundamentos.”</b>`} },
  { type:"live", step:1, sel:".checks",
    tag:{en:"Step 2 · Checklist",es:"Paso 2 · Lista de verificación"}, kick:{en:"Step 2",es:"Paso 2"}, title:{en:"Tick all three boxes",es:"Marca las tres casillas"},
    text:{en:`Router relocated, Dual-SSID attempted, no parallel network. Each box has its own <b>Guide</b> if you need it.`,
          es:`Router reubicado, SSID doble intentado, sin red paralela. Cada casilla tiene su propia <b>Guía</b> si la necesitas.`} },
  { type:"panel",
    html:{en:`
      <div class="ic" style="background:#fbe9cf;color:#b5791f">!</div>
      <h2>You're affirming the work</h2>
      <p>The first time you tick a box, an <b>Attestation required</b> prompt appears. Checking these boxes formally affirms you actually did the steps — relocated the router, split the SSIDs, and confirmed no parallel networks.</p>
      <p style="color:#ffd66b"><b>It's an official record.</b> If it's later found the steps weren't done, you may be held accountable. Tap <b>“I affirm”</b> to continue.</p>`,
    es:`
      <div class="ic" style="background:#fbe9cf;color:#b5791f">!</div>
      <h2>Estás afirmando el trabajo</h2>
      <p>La primera vez que marques una casilla, aparece un aviso de <b>Declaración requerida</b>. Marcar estas casillas afirma formalmente que sí hiciste los pasos — reubicaste el router, dividiste los SSID y confirmaste que no hay redes paralelas.</p>
      <p style="color:#ffd66b"><b>Es un registro oficial.</b> Si más adelante se determina que los pasos no se hicieron, podrías ser responsabilizado. Toca <b>“Afirmo”</b> para continuar.</p>`} },
  { type:"live", step:1, sel:".readings",
    tag:{en:"Step 2 · ONT readings",es:"Paso 2 · Lecturas del ONT"}, kick:{en:"Step 2",es:"Paso 2"}, title:{en:"Pick your ONT type & enter readings",es:"Elige tu tipo de ONT e ingresa lecturas"},
    text:{en:`Pick <b>iPhotonix</b> (−13 to −21 dB, 1490 + 1550) or <b>Adtran</b> (−10 to −22 dB, 1577), plus the <b>Frontline Health Score</b>. At a <b>SWITCH/NEXGEN</b> property, pick that — no light readings, just the switch checkpoint. <b>Continue</b> unlocks once they're in.`,
          es:`Elige <b>iPhotonix</b> (−13 a −21 dB, 1490 + 1550) o <b>Adtran</b> (−10 a −22 dB, 1577), más el <b>Puntaje de Salud de Frontline</b>. En una propiedad <b>SWITCH/NEXGEN</b>, elige esa — sin lecturas de luz, solo el punto de control del switch. <b>Continuar</b> se desbloquea cuando estén listas.`} },
  { type:"live", step:2, sel:"#reqForm",
    tag:{en:"Step 3 · Submit",es:"Paso 3 · Enviar"}, kick:{en:"Step 3",es:"Paso 3"}, title:{en:"Submit the request",es:"Envía la solicitud"},
    text:{en:`Customer, account/job #, <b>property/MDU</b>, the <b>EVO S/N or MAC</b> you're removing + its account, your <b>market</b>, your name, and the <b>reason</b> for the swap. Tap <b>Request approval</b>.`,
          es:`Cliente, # de cuenta/trabajo, <b>propiedad/MDU</b>, el <b>S/N o MAC del EVO</b> que remueves + su cuenta, tu <b>mercado</b>, tu nombre y la <b>razón</b> del cambio. Toca <b>Solicitar aprobación</b>.`} },
  { type:"live", step:3, sel:"#resultCard",
    tag:{en:"After you submit",es:"Después de enviar"}, kick:{en:"Confirmation",es:"Confirmación"}, title:{en:"Request sent — and it's gated",es:"Solicitud enviada — y está detenida"},
    text:{en:`The job is <b>locked</b> until your manager decides — they're pinged instantly. Your screen then turns <span class="ok-t">GREEN</span> (approved) or <span class="no-t">RED</span> (denied) with their reason.`,
          es:`El trabajo está <b>bloqueado</b> hasta que tu gerente decida — se le notifica al instante. Tu pantalla se pondrá <span class="ok-t">VERDE</span> (aprobado) o <span class="no-t">ROJA</span> (denegado) con su razón.`} },
  { type:"panel",
    html:{en:`
      <div class="ic">★</div>
      <h2>That's it</h2>
      <p>Basics → checklist → submit → wait for the <span class="ok-t">green</span>.</p>
      <p>Every removed EVO returns to <b>4558 in Orlando</b> with its account #.</p>
      <p style="color:#9fb3cc">Reopen this anytime from <b>“How it works.”</b></p>`,
    es:`
      <div class="ic">★</div>
      <h2>Eso es todo</h2>
      <p>Fundamentos → lista → enviar → espera el <span class="ok-t">verde</span>.</p>
      <p>Todo EVO removido regresa al <b>4558 en Orlando</b> con su # de cuenta.</p>
      <p style="color:#9fb3cc">Reabre esto en cualquier momento desde <b>“Cómo funciona.”</b></p>`} },
];

const explain=document.getElementById("explain"),device=document.getElementById("device"),panel=document.getElementById("panel"),
      frame=document.getElementById("siteFrame"),deviceTag=document.getElementById("deviceTag"),countEl=document.getElementById("count"),
      dotsEl=document.getElementById("dots"),back=document.getElementById("back"),next=document.getElementById("next");
let i=0,frameReady=false;
// language: read the choice the tech made on the main app (localStorage), default EN
let LANG = "en";
try { LANG = localStorage.getItem("evo_lang") === "es" ? "es" : "en"; } catch(e){}
function L(field){ // pick en/es from a slide field that may be a {en,es} object or a plain string
  if(field==null) return "";
  return (typeof field==="object") ? (field[LANG]||field.en||"") : field;
}
function setLang(lang){
  LANG = lang==="es" ? "es" : "en";
  try{ localStorage.setItem("evo_lang", LANG); }catch(e){}
  document.documentElement.lang = LANG;
  document.querySelectorAll(".tlang-opt").forEach(o=>o.classList.toggle("on", o.dataset.lang===LANG));
  render();
}

// device detection — keys off the SAME breakpoint the dashboard layout uses,
// so the walkthrough always matches what the tech is actually looking at.
const MQ = window.matchMedia("(min-width:980px)");
function applyDevice(){ document.body.classList.toggle("dev-desktop", MQ.matches); }
function onMQ(){ applyDevice(); render(); }
applyDevice();
if (MQ.addEventListener) MQ.addEventListener("change", onMQ); else MQ.addListener(onMQ);

function setVal(doc,id,val){ const el=doc.getElementById(id); if(!el)return; el.value=val; el.dispatchEvent(new Event("input",{bubbles:true})); el.dispatchEvent(new Event("change",{bubbles:true})); }
function setChk(doc,id){ const el=doc.getElementById(id); if(!el)return; el.checked=true; el.dispatchEvent(new Event("change",{bubbles:true})); }

function fillExample(){
  try{
    const doc=frame.contentDocument;
    setChk(doc,"c_relocate"); setChk(doc,"c_ssid"); setChk(doc,"c_parallel");
    // pick iPhotonix and fill its fields (r_ont no longer exists)
    try{ const ip=doc.querySelector('.ont-pick[data-ont="iphotonix"]'); if(ip) ip.click(); }catch(e){}
    setVal(doc,"r_nid","-16"); setVal(doc,"r_1490","-15"); setVal(doc,"r_1550","-17"); setVal(doc,"r_health","90");
    setVal(doc,"f_first","Angel"); setVal(doc,"f_last","Gerena"); setVal(doc,"f_acct","30049999");
    setVal(doc,"f_mdu","The Vue"); setVal(doc,"f_serial","1834AFA99999"); setVal(doc,"f_removed","30049999");
    setVal(doc,"f_market","SWFL"); setVal(doc,"f_tech","John Doe");
    setVal(doc,"f_reason","Router won't power up, replaced power supply and moved to different outlet, no change.");
    // build a realistic "Request sent" result card for the confirmation step
    const rc=doc.getElementById("resultCard");
    if(rc){ rc.innerHTML=`
      <div style="text-align:center;padding:6px 4px">
        <div style="width:64px;height:64px;border-radius:50%;background:#fbe9cf;color:#b5791f;display:grid;place-items:center;font-size:30px;margin:0 auto 14px">✓</div>
        <h2 style="margin:0 0 8px;font-size:21px;color:#15233a">Request sent</h2>
        <p style="margin:0 0 12px;color:#5b6b80;font-size:14.5px">The job is gated until a manager decides — they've been pinged now.</p>
        <div style="font-weight:800;color:#15233a;margin-bottom:12px">Routed to Peterson Germain</div>
        <div style="background:#f4f7fb;border-radius:12px;padding:11px 14px;color:#5b6b80;font-size:13.5px">● Waiting on their decision… this screen updates by itself.</div>
      </div>`; }
  }catch(e){}
}

frame.addEventListener("load",()=>{ frameReady=true; fillExample(); if(SLIDES[i].type==="live") driveLive(SLIDES[i]); });

function driveLive(s){
  if(!frameReady) return;
  try{
    const doc=frame.contentDocument,win=frame.contentWindow;
    doc.querySelectorAll(".step").forEach(el=>el.classList.toggle("is-active",el.getAttribute("data-step")==String(s.step)));
    doc.querySelectorAll(".rail-step").forEach(el=>el.classList.toggle("is-active",el.getAttribute("data-go")==String(s.step)));
    const desktop=document.body.classList.contains("dev-desktop");
    setTimeout(()=>{ try{
      // On desktop the sidebar holds the guides, so for the Basics&Guides slide
      // show the whole two-pane (scroll top) instead of cropping to the sidebar.
      const topOnly = !s.sel || (desktop && s.sel===".resources");
      if(!topOnly){ const el=doc.querySelector(s.sel); if(el){ el.scrollIntoView({block:"start"}); win.scrollBy(0,-14); return; } }
      win.scrollTo(0,0);
    }catch(e){} },120);
  }catch(e){}
}

function render(){
  const s=SLIDES[i];
  countEl.textContent=`${i+1} / ${SLIDES.length}`;
  dotsEl.innerHTML=SLIDES.map((_,n)=>`<span class="dot ${n===i?"on":""}"></span>`).join("");
  back.disabled=i===0; next.textContent=i===SLIDES.length-1?(LANG==="es"?"Listo ✓":"Done ✓"):(LANG==="es"?"Siguiente ›":"Next ›");
  back.textContent = LANG==="es" ? "‹ Atrás" : "‹ Back";
  explain.hidden=true; device.hidden=true; panel.hidden=true;
  if(s.type==="panel"){ panel.hidden=false; panel.innerHTML=L(s.html); }
  else { const txt=(MQ.matches && s.dtext)?L(s.dtext):L(s.text); explain.hidden=false; explain.innerHTML=`<div class="kick">${L(s.kick)}</div><h2>${L(s.title)}</h2><p>${txt}</p>`;
    device.hidden=false; deviceTag.textContent=L(s.tag)||""; driveLive(s); }
}
function go(d){ const n=i+d; if(n<0)return; if(n>=SLIDES.length){closeTut();return;} i=n; render(); }
function closeTut(){ if(history.length>1) history.back(); else location.href="index.html"; }
back.addEventListener("click",()=>go(-1)); next.addEventListener("click",()=>go(1));
document.getElementById("close").addEventListener("click",closeTut);
document.addEventListener("keydown",e=>{ if(e.key==="ArrowRight")go(1); else if(e.key==="ArrowLeft")go(-1); else if(e.key==="Escape")closeTut(); });
let tx=null;
document.querySelector(".stage").addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
document.querySelector(".stage").addEventListener("touchend",e=>{ if(tx==null)return; const dx=e.changedTouches[0].clientX-tx; tx=null; if(dx<-45)go(1); else if(dx>45)go(-1); });
// language toggle in the top bar
document.querySelectorAll(".tlang-opt").forEach(o=>o.addEventListener("click",()=>setLang(o.dataset.lang)));
document.documentElement.lang = LANG;
document.querySelectorAll(".tlang-opt").forEach(o=>o.classList.toggle("on", o.dataset.lang===LANG));
render();
</script>
</body>
</html>
